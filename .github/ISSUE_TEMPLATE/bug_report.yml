name: 缺陷报告
description: 报告可以稳定复现的功能问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全漏洞请勿填写此表单，请改用仓库的私密安全报告功能。
  - type: input
    id: version
    attributes:
      label: 云粘贴版本
      placeholder: 例如 1.13.0
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options:
        - Docker Compose
        - 本地开发环境
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请使用脱敏数据描述从打开页面到问题出现的完整步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志或截图
      description: 不要上传密码、令牌、数据库、私有文件名或远端存储凭据。
